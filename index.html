    <script language="JavaScript" type="text/javascript">

        var picArr=[];
        var canvasLoading,canvas,stage,loadingStage,exportRoot;
        var queue;
        var scale=1;
        var picNum=0;
        var picTotal=0;
        var loadingProgress=0;

        var loadingPanel;
        var appPanel;
        var screenPanel;
        var model=new createjs.MovieClip();

        var _fps,$time,$count = 0;
        var username='';
        var hasUsername=false;
        var currentUser=null;

        init();

        function init()
        {
            inputNamePanelDisplay(false);
            tcssComplete();
            queue=new createjs.LoadQueue(true);

            var tmpStr=2;
            console.log('heartNum:',tmpStr);
            HEARTNUM=Number(tmpStr);

            SHARE_URL='http://roco.qq.com/act/a20141208game/index.html?heartNum='+HEARTNUM.toString();
            
            checkLoginStatus();
        }

        function checkLoginStatus()
        {
            var storedUser=localStorage.getItem('current_user');
            if(storedUser&&storedUser!='')
            {
                currentUser=JSON.parse(storedUser);
                username=currentUser.username;
                hasUsername=true;
                console.log('已登录用户:',username);
                document.getElementById('userInfo').classList.add('show');
                document.getElementById('currentUser').textContent=currentUser.username;
                document.getElementById('authPanel').classList.remove('show');
            }
            else
            {
                currentUser=null;
                hasUsername=false;
                document.getElementById('authPanel').classList.add('show');
                document.getElementById('userInfo').classList.remove('show');
            }
        }

        function switchTab(tab)
        {
            document.querySelectorAll('.auth-tab').forEach(function(el){
                el.classList.remove('active');
            });
            event.target.classList.add('active');
            
            if(tab=='login')
            {
                document.getElementById('loginForm').style.display='flex';
                document.getElementById('registerForm').style.display='none';
            }
            else
            {
                document.getElementById('loginForm').style.display='none';
                document.getElementById('registerForm').style.display='flex';
            }
            hideAuthMessage();
        }

        function handleLogin()
        {
            var uname=document.getElementById('loginUsername').value.trim();
            var pwd=document.getElementById('loginPassword').value;
            
            if(!uname||!pwd)
            {
                showAuthError('请输入用户名和密码');
                return;
            }
            
            var users=localStorage.getItem('game_users');
            var userList=users?JSON.parse(users):[];
            
            var found=userList.find(function(u){
                return u.username==uname&&u.password==pwd;
            });
            
            if(found)
            {
                currentUser=found;
                username=found.username;
                hasUsername=true;
                localStorage.setItem('current_user',JSON.stringify(found));
                
                document.getElementById('userInfo').classList.add('show');
                document.getElementById('currentUser').textContent=username;
                document.getElementById('authPanel').classList.remove('show');
                
                showAuthSuccess('登录成功！');
                setTimeout(function(){hideAuthMessage();},1500);
                
                // 根据用户是否首次游戏设置是否显示教程
                window.isNeedTeach=(currentUser.firstPlay===undefined||currentUser.firstPlay===true);
            }
            else
            {
                showAuthError('用户名或密码错误');
            }
        }

        function handleRegister()
        {
            var uname=document.getElementById('regUsername').value.trim();
            var pwd=document.getElementById('regPassword').value;
            var confirm=document.getElementById('regConfirm').value;
            
            if(!uname||!pwd||!confirm)
            {
                showAuthError('请填写完整信息');
                return;
            }
            
            if(uname.length<3||uname.length>12)
            {
                showAuthError('用户名长度必须在3-12位之间');
                return;
            }
            
            if(pwd.length<6||pwd.length>16)
            {
                showAuthError('密码长度必须在6-16位之间');
                return;
            }
            
            if(pwd!=confirm)
            {
                showAuthError('两次输入的密码不一致');
                return;
            }
            
            var users=localStorage.getItem('game_users');
            var userList=users?JSON.parse(users):[];
            
            var exists=userList.find(function(u){
                return u.username==uname;
            });
            
            if(exists)
            {
                showAuthError('用户名已存在');
                return;
            }
            
            var newUser={
                username:uname,
                password:pwd,
                createdAt:new Date().toLocaleString('zh-CN'),
                firstPlay:true//新用户首次游戏需要显示教程
            };
            
            userList.push(newUser);
            localStorage.setItem('game_users',JSON.stringify(userList));
            
            currentUser=newUser;
            username=newUser.username;
            hasUsername=true;
            localStorage.setItem('current_user',JSON.stringify(newUser));
            
            document.getElementById('userInfo').classList.add('show');
            document.getElementById('currentUser').textContent=username;
            document.getElementById('authPanel').classList.remove('show');
            
            showAuthSuccess('注册成功！');
            setTimeout(function(){hideAuthMessage();},1500);
            
            // 新用户首次游戏，显示教程
            window.isNeedTeach=true;
        }

        function handleLogout()
        {
            localStorage.removeItem('current_user');
            currentUser=null;
            username='';
            hasUsername=false;
            document.getElementById('userInfo').classList.remove('show');
            document.getElementById('authPanel').classList.add('show');
            document.getElementById('loginUsername').value='';
            document.getElementById('loginPassword').value='';
            switchTab('login');
        }

        function showAuthError(msg)
        {
            document.getElementById('authError').textContent=msg;
            document.getElementById('authError').classList.add('show');
            document.getElementById('authSuccess').classList.remove('show');
        }

        function showAuthSuccess(msg)
        {
            document.getElementById('authSuccess').textContent=msg;
            document.getElementById('authSuccess').classList.add('show');
            document.getElementById('authError').classList.remove('show');
        }

        function hideAuthMessage()
        {
            document.getElementById('authError').classList.remove('show');
            document.getElementById('authSuccess').classList.remove('show');
        }

        function initLoading()
        {
            canvasLoading=document.getElementById('canvasLoading');

            loadingImages = loadingImages||{};

            var loader = new createjs.LoadQueue(false);
            loader.addEventListener("fileload", loadingHandleFileLoad);
            loader.addEventListener("complete", loadingHandleComplete);
            loader.loadManifest(loadingLib.properties.manifest);
        }

        function loadingHandleFileLoad(evt) {
            if (evt.item.type == "image") { loadingImages[evt.item.id] = evt.result; }
        }

        function loadingHandleComplete() {
            exportRoot = new loadingLib.loading();

            stage = new createjs.Stage(canvasLoading);
            stage.addChild(exportRoot);
            stage.update();

            createjs.Ticker.setFPS(loadingLib.properties.fps);
            createjs.Ticker.addEventListener("tick", stage);

            loadingPanel=new loadingObj();

            if(isLoadBigPic)
            {
                queue.setMaxConnections(5);
                queue.on('complete',imagesLoadComplete,this);
                queue.on('progress',imagesLoadProgress);

                var manifestLength=lib.properties.manifest.length;
                picArr=[].concat(lib.properties.manifest);
                for(var i=0;i<gamedataArr.length;i++)
                {
                    for (prop in gamedataArr[i].animations)
                    {
                        for(var j=0;j<manifestLength;j++)
                        {
                            if(picArr[j])
                            {
                                if(prop==picArr[j].id)
                                {
                                    picArr.splice(j,1);
                                    j-=1;
                                }
                            }
                        }
                    }
                    picArr.push({id:'test'+ i.toString(),src:gamedataArr[i].images[0]});
                }
                queue.loadManifest(picArr);
            }
            else
            {
                initMain();
            }
        }

        function imagesLoadProgress(e)
        {
            loadingProgress= e.progress;
        }

        function imagesLoadComplete(e)
        {
            initMain();
        }

        function initMain()
        {
            canvas = document.getElementById('canvas');
            images = images||{};

            picTotal=lib.properties.manifest.length;

            if(isLoadBigPic)
            {
                for(var i=0;i<gamedataArr.length;i++)
                {
                    setImgItem(gamedataArr[i],lib,images);
                }

                for(var j=0;j<picArr.length;j++)
                {
                    for(var k=0;k<picTotal;k++)
                    {
                        if(lib.properties.manifest[k].id==picArr[j].id)
                        {
                            images[picArr[j].id]=queue.getResult(picArr[j].id);
                        }
                    }
                }
                initHandleComplete();
            }
            else
            {
                var loader = new createjs.LoadQueue(false);
                loader.addEventListener("fileload", initHandleFileLoad);
                loader.addEventListener("complete", initHandleComplete);
                loader.loadManifest(lib.properties.manifest);
            }
        }

        function initHandleFileLoad(evt) {
            picNum+=1;
            loadingProgress=picNum/picTotal;
            if (evt.item.type == "image") { images[evt.item.id] = evt.result; }
        }

        function initHandleComplete() {
            exportRoot = new lib.main();

            stage = new createjs.Stage(canvas);
            stage.addChild(exportRoot);
            stage.update();

            if(isNeedFps)
            {
                _fps = new createjs.Text("0","900 36px Arial", "#000000");
                stage.addChild(_fps);
                $time = new Date().getTime();
            }

            createjs.Ticker.setFPS(lib.properties.fps);
            createjs.Ticker.addEventListener("tick", stageFun);

            createjs.EventDispatcher.initialize(model);

            screenPanel=new screenObj();
            screenPanel.init();

            appPanel=new appObj();
            appPanel.init();
        }

        function loadingNone()
        {
            stage.removeChild(loading);
            document.getElementById('loading').style.display="none";
        }

        function stageFun()
        {
            if(isNeedFps)
            {
                $count++;
                var now = new Date().getTime();
                if( now-$time>1000 ){
                    _fps.text = "fps:"+ Math.round( $count*10000 / (now-$time))/10+'/'+lib.properties.fps;
                    $time = now;
                    $count = 0;
                }
            }
            stage.update();
        }

        function gameStart()
        {
        }

        function gameOver()
        {
        }

        function inputNamePanelStartGame()
        {
            username=document.getElementById('usernameInput').value;
            if(username=='请输入！如：坏运气'||username=='')
            {
                username='洛克小蛋蛋';
            }
            localStorage.setItem('game_username',username);
            hasUsername=true;
            inputNamePanelDisplay(false);
            appPanel.startGame();
        }

        function inputNamePanelDisplay(arg)
        {
            if(arg==true)
            {
                document.getElementById('inputNamePanel').style.display='block';
            }
            else
            {
                document.getElementById('inputNamePanel').style.display='none';
            }
        }

        function inputFocus()
        {
            username=document.getElementById('usernameInput').value;
            if(username=='请输入！如：坏运气')
            {
                document.getElementById('usernameInput').value='';
            }
        }

        function showRecordPanel()
        {
            document.getElementById('recordPanel').classList.add('show');
            loadRecords();
        }

        function closeRecordPanel()
        {
            document.getElementById('recordPanel').classList.remove('show');
        }

        function loadRecords()
        {
            var records=localStorage.getItem('game_records');
            var recordList=records?JSON.parse(records):[];
            var content=document.getElementById('recordContent');
            
            if(recordList.length==0)
            {
                content.innerHTML='<div class="no-record">暂无游戏记录</div>';
                return;
            }
            
            var html='<div class="record-title"><span>游戏记录</span><span class="clear-records" onclick="clearAllRecords()">清空记录</span></div>';
            for(var i=0;i<recordList.length;i++)
            {
                html+='<div class="record-item"><span class="record-score">'+recordList[i].score+' 米</span><span class="record-time">'+recordList[i].time+'</span></div>';
            }
            content.innerHTML=html;
        }

        function clearAllRecords()
        {
            if(confirm('确定要清空所有游戏记录吗？'))
            {
                localStorage.removeItem('game_records');
                loadRecords();
            }
        }

        var sw=window.screen.width*0.9,sh=(sw*296)/256;
        function g(id){return document.getElementById(id);}
        if(window.screen.width<=640){
            g("inputNamePanel").style.width=sw+"px";
            g("inputNamePanel").style.height=sh+"px";
            g("inputNamePanel").style.marginLeft=-(sw/2)+"px";
            g("inputNamePanel").style.marginTop=-(sh/2)+"px";
            g("usernameInput").style.width=sw*0.9+"px";
            g("usernameInput").style.marginLeft=-(sw*0.9/2)+"px";
            g("usernameInput").style.top=sh*0.555+"px";
            g("wBtn").style.top=sh*0.735+"px";
            g("wBtn").style.width=sw*0.9+"px";
            g("wBtn").style.marginLeft=-(sw*0.9/2)+"px";
            g("wBtn").style.height=sh*0.2+"px";
        }

    </script>
